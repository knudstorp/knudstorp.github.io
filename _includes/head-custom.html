<!-- Mobile menu fixes -->
<style>
/* Ensure mobile menu button sits above everything */
.greedy-nav {
  position: relative;
  z-index: 1000;
}

.greedy-nav button {
  position: relative;
  z-index: 1001;
}

/* Prevent hero overlay from blocking taps */
.page__hero {
  pointer-events: none;
}
.page__hero * {
  pointer-events: auto;
}

/* Mobile menu toggle: hide by default, show when active */
.greedy-nav .visible-links {
  display: none;
}
.greedy-nav .visible-links.active {
  display: block;
}
</style>

<!-- Mobile menu toggle JS -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const toggle = document.querySelector("#menu-toggle");
  const menu = document.querySelector(".greedy-nav .visible-links");

  if (toggle && menu) {
    toggle.addEventListener("click", function() {
      menu.classList.toggle("active");
    });
  }
});
</script>
